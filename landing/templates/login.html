{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G.N. Esporte - Login</title>
    <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Cores primárias e fontes do seu site original */
        .bg-cream {
            background-color: rgb(243, 250, 255)
        }
        body {
            font-family: 'Poppins', sans-serif;
        }
        .bg-yellow-500 {
            background-color: #F48C06;
        }
        .text-yellow-500 {
            color: #F48C06;
        }
        .text-darken {
            color: #1485E3;
        }
        .hover\:bg-yellow-600:hover {
            background-color: #E67E00; /* Um tom um pouco mais escuro para o hover */
        }
        .focus\:border-yellow-500:focus {
            border-color: #F48C06;
        }
        .focus\:ring-yellow-500:focus {
            --tw-ring-color: #F48C06;
        }
    </style>
</head>
<body class="bg-cream antialiased">

    <div class="min-h-screen flex flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        
        <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8 space-y-8">
            
            <div>
                <a href="/">
                    <img class="mx-auto h-12 w-auto" src="{% static 'img/land/gne_logo.png' %}" alt="G.N. Esporte">
                </a>
                <h2 class="mt-6 text-center text-3xl font-bold text-darken">
                    Área de Acesso
                </h2>
                <p class="mt-2 text-center text-sm text-gray-600">
                    Login para parceiros e funcionários
                </p>
            </div>

            <form class="mt-8 space-y-6" action="{% url 'login' %}" method="POST">{% csrf_token %}
                <input type="hidden" name="remember" value="true">
                <div class="rounded-md shadow-sm -space-y-px">
                    <div class="mb-4">
                        <label for="username" class="sr-only">Usuário</label>
                        <input id="username" name="username" type="text" autocomplete="username" required class="appearance-none rounded-lg relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-yellow-500 focus:border-yellow-500 focus:z-10 sm:text-sm" placeholder="Seu usuário">
                    </div>
                    <div>
                        <label for="password" class="sr-only">Senha</label>
                        <input id="password" name="senha" type="password" autocomplete="current-password" required class="appearance-none rounded-lg relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-yellow-500 focus:border-yellow-500 focus:z-10 sm:text-sm" placeholder="Sua senha">
                    </div>
                </div>

                <div>
                    <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-lg font-bold rounded-full text-white bg-yellow-500 hover:bg-yellow-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-yellow-500 transform transition hover:scale-105 duration-300 ease-in-out">
                        Entrar
                    </button>
                </div>
            </form>

            <!--<div class="text-sm text-center">
                <a href="#" class="font-medium text-yellow-500 hover:text-yellow-600">
                    Esqueceu sua senha?
                </a>
            </div>-->

        </div>

        <div class="mt-8 text-center">
            <a href="{% url 'landingpage' %}" class="text-sm text-gray-600 hover:text-darken">
                &larr; Voltar ao site principal
            </a>
        </div>
    </div>

</body>
</html>
