{% extends 'menu_lateral.html' %}
{% load static %}

{% block 'title' %}Pagamento Feito{% endblock %}

{% block 'main' %}
<main class="main-content p-6 md:p-10 flex flex-col items-center">
    <div class="w-full max-w-lg mx-auto bg-white p-6 rounded-lg shadow-lg">

        <h2 class="text-2xl font-semibold text-darken mb-6 text-center">Pagamento Feito</h2>

        <form action="{% url 'cad_pago' %}" method="POST" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <label for="funcionario" class="block text-sm font-medium text-gray-700">Funcionário:</label>
                <select id="funcionario" name="funcionario" class="mt-1 block w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-darken">
                    <option value="">Escolha o funcionário...</option>
                    {% for funcionario in funcionarios %}
                        <option value="{{ funcionario.id }}">{{ funcionario.nome }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label for="valor" class="block text-sm font-medium text-gray-700">Valor:</label>
                <input type="number" step="0.01" id="valor" name="valor" placeholder="Ex.: 199.99" class="mt-1 block w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-darken">
            </div>

            <div>
                <label for="data" class="block text-sm font-medium text-gray-700">Data do pagamento:</label>
                <input type="date" id="data" name="data" value="{{ data_atual }}" class="mt-1 block w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-darken">
            </div>

            <div>
                <label for="obs" class="block text-sm font-medium text-gray-700">Observação:</label>
                <textarea id="obs" rows="5" name="obs" placeholder="..." class="mt-1 block w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-darken"></textarea>
            </div>
            
            <button type="submit" class="w-full bg-darken text-white font-bold py-3 px-6 rounded-lg shadow hover:bg-blue-700 transition-colors duration-300">
                Cadastrar
            </button>
        </form>
    </div>
</main>
{% endblock %}
