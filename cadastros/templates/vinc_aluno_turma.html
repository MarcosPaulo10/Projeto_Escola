{% extends 'menu_lateral.html' %}
{% load static %}

{% block 'title' %}Vínculo Aluno - Turma{% endblock %}

{% block 'main' %}
<main class="main-content p-6 md:p-10 flex flex-col items-center">
    <div class="w-full max-w-lg mx-auto bg-white p-6 rounded-lg shadow-lg">

        <h2 class="text-2xl font-semibold text-darken mb-6 text-center">Vínculo Aluno - Turma</h2>

        <form action="{% url 'vinculo_aluno_turma' %}" method="POST" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <label for="aluno_id" class="block text-sm font-medium text-gray-700">Aluno:</label>
                <select id="aluno_id" name="aluno_id" class="mt-1 block w-full p-3 border border-gray-300 rounded-lg">
                    <option value="">Escolha o aluno...</option>
                    {% for aluno in alunos %}
                        <option value="{{ aluno.id }}" {% if aluno.id|stringformat:"s" == aluno_id_selecionado %}selected{% endif %}>
                            {{ aluno.nome }}
                        </option>
                    {% endfor %}
                </select>
            </div>
            
            <div>
                <label for="turma_id" class="block text-sm font-medium text-gray-700">Turma:</label>
                <select id="turma_id" name="turma_id" class="mt-1 block w-full p-3 border border-gray-300 rounded-lg">
                    <option value="">Escolha a turma...</option>
                    {% for turma in turmas %}
                        <option value="{{ turma.id }}">{{ turma }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div>
                <label for="valor" class="block text-sm font-medium text-gray-700">Valor:</label>
                <input type="number" step="0.01" id="valor" name="valor" placeholder="Ex.: 199.99" class="mt-1 block w-full p-3 border border-gray-300 rounded-lg">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Divisão do pagamento:</label>
                <div class="mt-2 space-y-2">
                    {% for key, value in opcoes_divisao %}
                    <div class="flex items-center space-x-2">
                        <input type="radio" id="{{ key }}" name="div_pagamento" value="{{ key }}" class="form-radio h-4 w-4 text-darken">
                        <label for="{{ key }}" class="text-gray-700">{{ value }}</label>
                    </div>
                    {% endfor %}
                </div>
            </div>
            
            <button type="submit" class="w-full bg-darken text-white font-bold py-3 px-6 rounded-lg shadow hover:bg-blue-700 transition-colors duration-300">
                Vincular
            </button>
        </form>
    </div>
</main>
{% endblock %}
