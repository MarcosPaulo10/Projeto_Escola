{% extends 'menu_lateral.html' %}
{% load static %}

{% block 'title' %}Vínculo Professor - Turma{% endblock %}

{% block 'main' %}
<main class="main-content p-6 md:p-10 flex flex-col items-center">
    <div class="w-full max-w-lg mx-auto bg-white p-6 rounded-lg shadow-lg">

        <h2 class="text-2xl font-semibold text-darken mb-6 text-center">Vínculo Professor - Turma</h2>

        <form action="{% url 'vinculo_funcionario_turma' %}" method="POST" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <label for="funcionario_id" class="block text-sm font-medium text-gray-700">Funcionário:</label>
                <select id="funcionario_id" name="funcionario_id" class="mt-1 block w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-darken">
                    <option value="">Escolha o funcionário...</option>
                    {% for funcionario in funcionarios %}
                        <option value="{{ funcionario.id }}">{{ funcionario.nome }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label for="turma_id" class="block text-sm font-medium text-gray-700">Turma:</label>
                <select id="turma_id" name="turma_id" class="mt-1 block w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-darken">
                    <option value="">Escolha o turma...</option>
                    {% for turma in turmas %}
                        <option value="{{ turma.id }}">{{ turma }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label for="valor" class="block text-sm font-medium text-gray-700">Valor da aula:</label>
                <input type="number" step="0.01" id="valor" name="valor" placeholder="Ex.: 199.99" class="mt-1 block w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-darken">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Dia da Semana:</label>
                <div class="mt-2 space-y-2">
                    <div class="flex items-center space-x-2">
                        <input type="radio" id="segunda" name="dias_semana" value="seg" class="form-radio h-4 w-4 text-darken focus:ring-darken">
                        <label for="segunda" class="text-gray-700">Segunda-Feira</label>
                    </div>
                    <div class="flex items-center space-x-2">
                        <input type="radio" id="terca" name="dias_semana" value="ter" class="form-radio h-4 w-4 text-darken focus:ring-darken">
                        <label for="terca" class="text-gray-700">Terça-Feira</label>
                    </div>
                    <div class="flex items-center space-x-2">
                        <input type="radio" id="quarta" name="dias_semana" value="qua" class="form-radio h-4 w-4 text-darken focus:ring-darken">
                        <label for="quarta" class="text-gray-700">Quarta-Feira</label>
                    </div>
                    <div class="flex items-center space-x-2">
                        <input type="radio" id="quinta" name="dias_semana" value="qui" class="form-radio h-4 w-4 text-darken focus:ring-darken">
                        <label for="quinta" class="text-gray-700">Quinta-Feira</label>
                    </div>
                    <div class="flex items-center space-x-2">
                        <input type="radio" id="sexta" name="dias_semana" value="sex" class="form-radio h-4 w-4 text-darken focus:ring-darken">
                        <label for="sexta" class="text-gray-700">Sexta-Feira</label>
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full bg-darken text-white font-bold py-3 px-6 rounded-lg shadow hover:bg-blue-700 transition-colors duration-300">
                Vincular
            </button>
        </form>
    </div>
</main>
{% endblock %}
