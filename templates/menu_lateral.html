{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block 'title' %}GNEsportes{% endblock %}</title>
    <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/gh/alpinejs/alpine@v2.x.x/dist/alpine.min.js" defer></script>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f3faff;
        }
        .bg-darken {
            background-color: #1485E3;
        }
        .text-darken {
            color: #1485E3;
        }
        .bg-yellow-500 {
            background-color: #E37214;
        }
        .text-yellow-500 {
            color: #E37214;
        }
        .sidenav {
            transition: transform 0.3s ease-in-out;
            transform: translateX(-100%);
            z-index: 50;
        }
        .sidenav.open {
            transform: translateX(0);
        }
        @media (min-width: 768px) {
            .sidenav {
                transform: none;
            }
        }
        .main-content {
            transition: margin-left 0.3s ease-in-out;
        }
        .topo-logo {
            height: auto;
            max-height: 12vh;
        }
    </style>
</head>
<body class="bg-gray-100">

    <div class="fixed top-0 left-0 p-4 z-40 md:hidden">
        <button class="text-darken text-2xl" onclick="toggleMenu()">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </button>
    </div>
    
    <div id="mySidenav" class="sidenav fixed inset-y-0 left-0 bg-darken w-64 p-6 overflow-y-auto flex flex-col">
        <div class="flex justify-end md:hidden">
            <button class="text-white text-2xl" onclick="toggleMenu()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <div class="flex justify-center mt-4 mb-8">
            <img class="topo-logo" src="{% static 'img/land/gne_logo_clara.png' %}" alt="GNE Logo">
        </div>
        
        <div class="flex-grow overflow-y-auto pb-20">
            <nav class="space-y-2">
                <!--<a href="{% url 'alunos_home' %}" class="flex items-center p-3 rounded-lg text-white font-medium hover:bg-yellow-500 transition-colors duration-300">
                    Alunos
                </a>
                <a href="{% url 'responsaveis_home' %}" class="flex items-center p-3 rounded-lg text-white font-medium hover:bg-yellow-500 transition-colors duration-300">
                    Responsáveis
                </a>-->
                <a href="{% url 'familias_dashboard' %}" class="flex items-center p-3 rounded-lg text-white font-medium hover:bg-yellow-500 transition-colors duration-300">
                    Famílias
                </a>
                <a href="{% url 'turmas_home' %}" class="flex items-center p-3 rounded-lg text-white font-medium hover:bg-yellow-500 transition-colors duration-300">
                    Turmas
                </a>
                <a href="{% url 'funcionarios_home' %}" class="flex items-center p-3 rounded-lg text-white font-medium hover:bg-yellow-500 transition-colors duration-300">
                    Funcionários
                </a>
                <a href="{% url 'parceiros_home' %}" class="flex items-center p-3 rounded-lg text-white font-medium hover:bg-yellow-500 transition-colors duration-300">
                    Parceiros
                </a>
                <a href="{% url 'cobrancas_mensais' %}" class="flex items-center p-3 rounded-lg text-white font-medium hover:bg-yellow-500 transition-colors duration-300">
                    Financeiro
                </a>
                <!--<a href="{% url 'chamada_home' %}" class="flex items-center p-3 rounded-lg text-white font-medium hover:bg-yellow-500 transition-colors duration-300">
                    Chamadas
                </a>-->
                <a href="{% url 'cadastros_home' %}" class="flex items-center p-3 rounded-lg text-white font-medium hover:bg-yellow-500 transition-colors duration-300">
                    Cadastrar
                </a>
            </nav>
        </div>

        <div class="w-full mt-auto pt-6">
            <a href="{% url 'logout' %}" class="flex items-center p-3 rounded-lg bg-yellow-500 text-white font-bold text-center justify-center transition-transform duration-300 hover:scale-105">
                Sair
            </a>
        </div>
    </div>

    <div id="main-content" class="main-content min-h-screen md:ml-64">
        
        {% if messages %}
        <div class="p-6 md:p-10 space-y-2">
            {% for message in messages %}
            <div class="p-4 text-sm rounded-lg 
                {% if message.tags == 'error' %} bg-red-100 text-red-700 
                {% elif message.tags == 'success' %} bg-green-100 text-green-700 
                {% else %} bg-blue-100 text-blue-700 {% endif %}"
                role="alert">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        {% block 'main' %}
        {% endblock %}
    </div>

    <script>
        function toggleMenu() {
            const sidenav = document.getElementById("mySidenav");
            const mainContent = document.getElementById("main-content");
            sidenav.classList.toggle("open");
            // Adiciona ou remove a margem do conteúdo principal em telas pequenas
            if (sidenav.classList.contains("open")) {
                mainContent.style.marginLeft = '0'; // ou ajuste conforme necessário
            } else {
                mainContent.style.marginLeft = '0';
            }
        }
    </script>
    
    {% block 'script' %}{% endblock %}
</body>
</html>
