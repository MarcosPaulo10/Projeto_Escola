{% extends 'menu_lateral.html' %}
{% block 'title' %}Despesas{% endblock %}

{% block 'main' %}
<main class="main-content p-6 md:p-10">
    <div class="w-full max-w-4xl mx-auto space-y-8">
        
        <section class="bg-white p-6 rounded-lg shadow-lg">
            <h2 class="text-2xl font-semibold text-darken mb-6">Cadastrar Despesa</h2>
            <form method="POST" action="{% url 'cad_gastos' %}" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                {% csrf_token %}
                
                <div class="md:col-span-2">
                    <label for="descricao" class="block text-sm font-medium text-gray-700">Descrição:</label>
                    <input type="text" name="descricao" id="descricao" required class="mt-1 block w-full p-3 border border-gray-300 rounded-lg">
                </div>

                <div>
                    <label for="categoria" class="block text-sm font-medium text-gray-700">Categoria:</label>
                    <select id="categoria" name="categoria" required class="mt-1 block w-full p-3 border border-gray-300 rounded-lg">
                        {% for cat, nome in categorias %}
                            <option value="{{ cat }}">{{ nome }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label for="valor" class="block text-sm font-medium text-gray-700">Valor (R$):</label>
                    <input type="number" step="0.01" name="valor" id="valor" required class="mt-1 block w-full p-3 border border-gray-300 rounded-lg">
                </div>

                <div>
                    <label for="data" class="block text-sm font-medium text-gray-700">Data:</label>
                    <input type="date" name="data" id="data" required class="mt-1 block w-full p-3 border border-gray-300 rounded-lg">
                </div>
                
                <div>
                    <label for="funcionario" class="block text-sm font-medium text-gray-700">Funcionário (Opcional):</label>
                    <select id="funcionario" name="funcionario" class="mt-1 block w-full p-3 border border-gray-300 rounded-lg">
                        <option value="">Nenhum</option>
                        {% for func in funcionarios %}
                            <option value="{{ func.id }}">{{ func.nome }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="md:col-span-2">
                    <label for="obs" class="block text-sm font-medium text-gray-700">Observação:</label>
                    <textarea name="obs" id="obs" rows="2" class="mt-1 block w-full p-3 border border-gray-300 rounded-lg"></textarea>
                </div>

                <div class="md:col-span-2 text-right">
                    <button type="submit" class="w-full md:w-auto bg-darken text-white font-bold py-3 px-6 rounded-lg shadow hover:bg-blue-700">
                        Cadastrar Despesa
                    </button>
                </div>
            </form>
        </section>

        <section class="bg-white p-6 rounded-lg shadow-lg">
            <h2 class="text-xl font-semibold text-darken mb-4">Despesas Lançadas</h2>
            </section>
    </div>
</main>
{% endblock %}
