{% extends 'menu_lateral.html' %}
{% block 'title' %}Editar Receita{% endblock %}

{% block 'main' %}
<main class="main-content p-6 md:p-10">
    <div class="w-full max-w-lg mx-auto">
        <section class="bg-white p-6 rounded-lg shadow-lg">
            <h2 class="text-2xl font-semibold text-darken mb-6">Editar Receita Avulsa</h2>
            
            <form method="POST" action="{% url 'editar_faturamento' faturamento.id %}" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                {% csrf_token %}
                
                <div class="md:col-span-2">
                    <label for="familia" class="block text-sm font-medium text-gray-700">Família:</label>
                    <select id="familia" name="familia" required class="mt-1 block w-full p-3 border border-gray-300 rounded-lg">
                        <option value="">Selecione a família...</option>
                        {% for familia in familias %}
                            <option value="{{ familia.id }}" {% if familia.id == faturamento.familia.id %}selected{% endif %}>
                                Família #{{ familia.id }} - {% for resp in familia.responsaveis.all %}{{ resp.nome }}{% if not forloop.last %}, {% endif %}{% endfor %}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="md:col-span-2 text-right">
                    <button type="submit" class="w-full md:w-auto bg-darken text-white font-bold py-3 px-6 rounded-lg shadow hover:bg-blue-700">
                        Salvar Alterações
                    </button>
                </div>
            </form>
        </section>
    </div>
</main>
{% endblock %}
