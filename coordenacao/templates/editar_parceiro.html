{% extends 'menu_lateral.html' %}
{% load static %}

{% block 'title' %}Editar Parceiro{% endblock %}

{% block 'main' %}
<main class="main-content p-6 md:p-10 flex flex-col items-center">
    <div class="w-full max-w-lg mx-auto bg-white p-6 rounded-lg shadow-lg">

        <h2 class="text-2xl font-semibold text-darken mb-6 text-center">Editar Parceiro</h2>

        <form action="{% url 'editar_parceiro' parceiro.id %}" method="POST" enctype="multipart/form-data" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <label for="tipo" class="block text-sm font-medium text-gray-700">Tipo de Parceiro:</label>
                <select id="tipo" name="tipo" class="mt-1 block w-full p-3 border border-gray-300 rounded-lg">
                    <option value="escola" {% if parceiro.tipo == 'escola' %}selected{% endif %}>Escola</option>
                    <option value="clube" {% if parceiro.tipo == 'clube' %}selected{% endif %}>Clube</option>
                    <option value="condominio" {% if parceiro.tipo == 'condominio' %}selected{% endif %}>Condomínio</option>
                    <option value="empresa" {% if parceiro.tipo == 'empresa' %}selected{% endif %}>Empresa</option>
                    <option value="outro" {% if parceiro.tipo == 'outro' %}selected{% endif %}>Outro</option>
                </select>
            </div>

            <div>
                <label for="nome" class="block text-sm font-medium text-gray-700">Nome do Parceiro:</label>
                <input type="text" id="nome" name="nome" value="{{ parceiro.nome|default:'' }}" class="mt-1 block w-full p-3 border border-gray-300 rounded-lg">
            </div>
            
            <div>
                <label for="cnpj" class="block text-sm font-medium text-gray-700">CNPJ:</label>
                <input type="text" id="cnpj" name="cnpj" value="{{ parceiro.cnpj|default:'' }}" class="mt-1 block w-full p-3 border border-gray-300 rounded-lg">
            </div>

            <div>
                <label for="telefone" class="block text-sm font-medium text-gray-700">Telefone:</label>
                <input type="text" id="telefone" name="telefone" value="{{ parceiro.telefone|default:'' }}" class="mt-1 block w-full p-3 border border-gray-300 rounded-lg">
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">E-mail:</label>
                <input type="email" id="email" name="email" value="{{ parceiro.e_mail|default:'' }}" class="mt-1 block w-full p-3 border border-gray-300 rounded-lg">
            </div>

            <div>
                <label for="chave_pix" class="block text-sm font-medium text-gray-700">Chave PIX:</label>
                <input type="text" id="chave_pix" name="chave_pix" value="{{ parceiro.chave_pix|default:'' }}" class="mt-1 block w-full p-3 border border-gray-300 rounded-lg">
            </div>

            <div>
                <label for="contrato" class="block text-sm font-medium text-gray-700">Substituir Contrato:</label>
                {% if parceiro.contrato %}
                    <p class="text-xs text-gray-600 mt-1">Atual: <a href="{{ parceiro.contrato.url }}" target="_blank" class="text-blue-600 hover:underline">{{ parceiro.contrato.name|cut:"parceiros/contratos/" }}</a></p>
                {% endif %}
                <input type="file" id="contrato" name="contrato" class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>

            <div>
                <label for="obs" class="block text-sm font-medium text-gray-700">Observação:</label>
                <textarea id="obs" name="obs" rows="3" class="mt-1 block w-full p-3 border border-gray-300 rounded-lg">{{ parceiro.obs|default:'' }}</textarea>
            </div>
            
            <button type="submit" class="w-full bg-darken text-white font-bold py-3 px-6 rounded-lg shadow hover:bg-blue-700">
                Salvar Alterações
            </button>
        </form>
    </div>
</main>
{% endblock %}
